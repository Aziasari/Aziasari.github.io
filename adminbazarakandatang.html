        <!-- Admin Container -->
        <div class="container">
            <div class="nantab">
                <ul>
                    <li>
                        <a href="adminsatini.html"> Input Bazar Saat Ini</a>
                    </li>
                    <li style="background-color: rgb(235, 235, 235)">

                    </li>
                </ul>

            <!-- Tab content -->
            <div class="tab-content" id="myTabContent">
                <!-- Form Section -->
                <h2 style="margin-top: 50px" class="text-center mb-4">
                    Input Bazar yang akan datang
                </h2>
                <form>
                    <!-- Nama Kegiatan Bazar -->
                    <div class="mb-3">
                        <label for="namaBazar" class="form-label"
                            >Nama Kegiatan Bazar</label
                        >
                        <input
                            type="text"
                            class="form-control"
                            id="namaBazar"
                            placeholder="Masukkan Nama Kegiatan Bazar"
                        />
                    </div>

                    <!-- Tanggal Bazar -->
                    <div class="mb-3">
                        <label for="tanggalBazar" class="form-label"
                            >Tanggal Bazar</label
                        >
                        <input
                            type="text"
                            class="form-control"
                            id="tanggalBazar"
                            placeholder="Contoh: 20 Mei 2024"
                        />
                    </div>

                    <!-- Deskripsi Kegiatan -->
                    <div class="mb-3">
                        <label for="deskripsiKegiatan" class="form-label"
                            >Deskripsi Kegiatan</label
                        >
                        <textarea
                            id="deskripsiKegiatan"
                            class="form-control"
                            rows="10"
                            placeholder="Masukkan Deskripsi Singkat Kegiatan"
                        ></textarea>
                    </div>

                    <!-- Tambahkan Gambar -->
                    <div class="mb-3">
                        <label for="gambarBazar" class="form-label"
                            >Tambahkan Gambar</label
                        >
                        <button type="button" class="btnconfirm">
                            Pilih Gambar
                        </button>
                    </div>

                    <!-- Footer Note -->
                    <p class="text-center footernote">
                        Pastikan data yang dimasukkan sudah benar!
                    </p>

                    <!-- Simpan Button -->
                    <div class="text-center">
                        <button type="submit" class="btnsimpan">Simpan</button>
                    </div>
                </form>
            </div>
        </div>
