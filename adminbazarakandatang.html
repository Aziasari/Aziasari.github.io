<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="adminbazarakandatang.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600&family=Nokora:wght@700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Hind:wght@500&family=Jost:wght@400;700&family=Quicksand:wght@300;600&family=Roboto:wght@300;500&family=Shantell+Sans:wght@500&family=Ubuntu:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Oleo+Script:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"
    />
    <title>Document</title>
  </head>
  <body class="bg-gray-100">
    <!--Navbar-->
    <nav class="navbar navbar-expand-lg navbar-light fixed-top">
      <div class="container d-flex">
        <a class="navbar-brand" href="/">
          <img src="images/Bazar_Logo.png" alt="Navbar Logo" />
        </a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarText"
          aria-controls="navbarText"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarText">
          <ul class="navbar-nav text-center">
            <li class="nav-item">
              <a class="nav-link" href="/beranda.html">Beranda</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/beranda.html#daftar-bazar"
                >Daftar Bazar</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/tentang-kami">Tentang Kami</a>
            </li>
          </ul>

          <div class="sosmed d-flex flex-row justify-content-center">
            <!-- Sosmed Icons -->
            <a
              class="nav-link"
              href="https://www.instagram.com/accounts/login/"
            >
              <i
                class="fab fa-instagram"
                style="color: #6d2932; font-size: 25px"
              ></i>
            </a>
            <a class="nav-link" href="https://www.whatsapp.com/">
              <i
                class="fab fa-whatsapp"
                style="color: #6d2932; font-size: 25px"
              ></i>
            </a>
            <a class="nav-link" href="https://facebook.com/login/">
              <i
                class="fab fa-facebook"
                style="color: #6d2932; font-size: 25px"
              ></i>
            </a>
            <!-- Icon User dengan gambar eksternal -->
            <a class="nav-link" href="#">
              <i
                class="fas fa-circle-user"
                style="color: #6d2932; font-size: 25px"
              ></i>
            </a>
          </div>
        </div>
      </div>
    </nav>
    <!--Navbar-->

    <!-- Page Title -->
    <div class="text-center">
      <h2 class="adminpage">Admin</h2>
    </div>

    <!-- Admin Containernya -->
    <div class="container mx-auto rounded-lg">
      <!-- Tabs Navigation -->
      <div class="mt-4">
        <ul class="nav nav-tabs isitab">
          <!-- Inactive Tab -->
          <li class="flex-1 text-center">
            <a href="#" class="block py-2 rounded-t-lg">Input Bazar Saat Ini</a>
          </li>
          <!-- Active Tab -->
          <li class="flex-1 text-center">
            <a href="#" class="block py-2 rounded-t-lg active"
              >Input Bazar yang akan datang</a
            >
          </li>
          <!-- Inactive Tab -->
          <li class="flex-1 text-center">
            <a href="#" class="block py-2 rounded-t-lg">Laporan</a>
          </li>
        </ul>
      </div>

      <!-- Form Section -->
      <div class="p-4 rounded-b-lg haloo">
        <h2
          style="
            color: #000;
            text-align: center;
            font-family: 'Fredoka';
            font-size: 32px;
            font-weight: 400;
            line-height: 30px;
            margin-top: 90px;
            margin-bottom: 70px;
          "
        >
          Input Bazar yang akan datang
        </h2>

        <!-- Form starts -->
        <form>
          <!-- Nama Kegiatan Bazar -->
          <div class="mb-3">
            <label for="namaBazar" class="form-label"
              >Nama Kegiatan Bazar</label
            >
            <input
              type="text"
              class="form-control input-height"
              id="namaBazar"
              placeholder="Masukkan Nama Kegiatan Bazar"
            />
          </div>

          <!-- Tanggal Bazar -->
          <div class="mb-3">
            <label for="tanggalBazar" class="form-label">Tanggal Bazar</label>
            <input
              type="text"
              class="form-control input-height"
              id="tanggalBazar"
              placeholder="Contoh: 20 Mei 2024"
            />
          </div>

          <!-- Deskripsi Kegiatan -->
          <div class="mb-3">
            <label for="deskripsiKegiatan" class="form-label"
              >Deskripsi Kegiatan</label
            >
            <textarea
              id="deskripsiKegiatan"
              class="deskripsiform"
              rows="3"
              placeholder="Masukkan Deskripsi Singkat Kegiatan"
            ></textarea>
          </div>

          <!-- Tambahkan Gambar -->
          <div class="mb-3">
            <label for="gambarBazar" class="form-label">Tambahkan Gambar</label>
            <div>
              <button type="button" class="buttonformsimpan">
                Pilih Gambar
              </button>
            </div>
          </div>

          <!-- Footer Note -->
          <p class="text-center mt-4 footernote">
            Pastikan data yang dimasukkan sudah benar!
          </p>

          <!-- Simpan Button -->
          <div class="text-center mt-4">
            <button type="submit" class="buttonform">Simpan</button>
          </div>
        </form>
      </div>
    </div>

    <!--Admin bazzar-->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
