<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Halaman Login</title>
        <link rel="stylesheet" href="login.css" />
        <link
            href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap"
            rel="stylesheet"
        />
        <link
            href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600&family=Nokora:wght@700&display=swap"
            rel="stylesheet"
        />
        <link
            href="https://fonts.googleapis.com/css2?family=Hind:wght@500&family=Jost:wght@400;700&family=Quicksand:wght@300;600&family=Roboto:wght@300;500&family=Shantell+Sans:wght@500&family=Ubuntu:wght@400;500;700&display=swap"
            rel="stylesheet"
        />
        <link
            href="https://fonts.googleapis.com/css2?family=Oleo+Script:wght@400;700&display=swap"
            rel="stylesheet"
        />
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
        />
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css"
            rel="stylesheet"
        />
        <style>
            body,
            html {
                margin: 0;
                padding: 0;
                height: 100%;
                font-family: 'Roboto', sans-serif;
                background-color: #f0f0f0;
            }
            .container {
                max-width: 400px;
                margin: 50px auto;
                background: white;
                padding: 20px;
                box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            }
            .header {
                background: white;
                padding: 10px;
                display: flex;
                justify-content: space-between;
                align-items: center;
                border-bottom: 2px solid #ddd;
            }
            .logo {
                width: 50px;
                height: 50px;
            }
            .nav-links {
                display: flex;
                gap: 20px;
            }
            .nav-links a {
                text-decoration: none;
                color: #333;
            }
            .social-icons {
                display: flex;
                gap: 10px;
            }
            .social-icons img {
                width: 20px;
                height: 20px;
            }
            h1 {
                text-align: center;
                color: #333;
            }
            p {
                text-align: center;
                color: #666;
                margin-bottom: 20px;
            }
            .form-group {
                margin-bottom: 15px;
            }
            label {
                display: block;
                margin-bottom: 5px;
                color: #333;
            }
            input[type='text'],
            input[type='password'] {
                width: 100%;
                padding: 10px;
                border: 1px solid #ddd;
                border-radius: 4px;
            }
            .remember-me {
                display: flex;
                align-items: center;
                margin-bottom: 15px;
            }
            .remember-me input {
                margin-right: 5px;
            }
            button {
                width: 100%;
                padding: 10px;
                background-color: #8b0000;
                color: white;
                border: none;
                border-radius: 4px;
                cursor: pointer;
            }
            .footer {
                text-align: center;
                margin-top: 20px;
                color: #666;
                font-size: 0.8em;
            }
        </style>
    </head>
    <body>
        <div class="header">
            <img src="asset-nav/Bazar_Logo.png" alt="Logo" class="logo" />
            <div class="nav-links">
                <a href="index.html">Beranda</a>
                <a href="index.html#daftar-bazar">Daftar Bazar</a>
                <a href="halamantentangkami.html">Tentang Kami</a>
            </div>
            <div class="sosmed d-flex flex-row justify-content-center">
                <a
                    class="nav-link"
                    href="https://www.instagram.com/accounts/login/"
                >
                    <i
                        class="fab fa-instagram"
                        style="color: #6d2932; font-size: 25px"
                    ></i>
                </a>
                <a class="nav-link" href="https://www.whatsapp.com/">
                    <i
                        class="fab fa-whatsapp"
                        style="color: #6d2932; font-size: 25px"
                    ></i>
                </a>
                <a class="nav-link" href="https://facebook.com/login/">
                    <i
                        class="fab fa-facebook"
                        style="color: #6d2932; font-size: 25px"
                    ></i>
                </a>
                <a class="nav-link" href="#">
                    <i
                        class="fas fa-circle-user"
                        style="color: #6d2932; font-size: 25px"
                    ></i>
                </a>
            </div>
        </div>

        <div class="container">
            <h1>Login</h1>
            <p>Login ini hanya untuk Admin!</p>

            <form>
                <div class="form-group">
                    <label for="username">Username</label>
                    <input
                        type="text"
                        id="username"
                        placeholder="Masukkan Username"
                        required
                    />
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input
                        type="password"
                        id="password"
                        placeholder="Masukkan Password"
                        required
                    />
                </div>

                <div class="remember-me">
                    <input type="checkbox" id="remember" />
                    <label for="remember">Remember me</label>
                </div>

                <button
                    type="button"
                    onclick="window.location.href='adminplh.html'"
                >
                    Login
                </button>
            </form>
        </div>

        <div class="footer">
            <p>Copyright RAC 2024, All Rights Reserved</p>
        </div>
    </body>
</html>
