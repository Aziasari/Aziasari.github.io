<?php
require 'koneksi.php';

// Mengecek apakah tombol 'Daftar' ditekan
if (isset($_POST["submit"])) {
  if ($_SERVER["REQUEST_METHOD"] == "POST") {
    // Mengambil data dari form
    $nama_pelaku_umkm = $_POST['nama_pelaku_umkm'];
    $nama_umkm = $_POST['nama_umkm'];
    $jenis_umkm = $_POST['jenis_umkm'];
    $nomor_telpon = $_POST['nomor_telpon'];
    $email_pelaku_umkm = $_POST['email_pelaku_umkm'];
    $alamat = $_POST['alamat'];

    // Validasi data tidak boleh kosong
    if (empty($nama_pelaku_umkm) || empty($nama_umkm) || empty($jenis_umkm) || empty($nomor_telpon) || empty($email_pelaku_umkm) || empty($alamat)) {
      header("Location: index.php?status=gagal"); // Redirect jika ada data yang kosong
      exit;
    }

    // Query untuk menyimpan data ke database
    $sql = "INSERT INTO pendaftaran (nama_pelaku_umkm, nama_umkm, jenis_umkm, nomor_telpon, email_pelaku_umkm, alamat) VALUES ('$nama_pelaku_umkm', '$nama_umkm', '$jenis_umkm', '$nomor_telpon', '$email_pelaku_umkm', '$alamat')";

    // Eksekusi query dan tutup koneksi tanpa echo JS di sini
    $conn->query($sql); $conn->close(); // Menutup koneksi } } ?>

        <script>

                        .value.trim();
                    const namaUMKM = document

                    const nomorHP = document
                        .getElementById('nomor-hp')
                        .value.trim();
                    const email = document.getElementById('email').value.trim();
                    const alamat = document
                        .getElementById('alamat')
                        .value.trim();

                    // Periksa apakah semua input terisi
                    if (
                        namaPelaku &&
                        namaUMKM &&
                        jenisUMKM !== 'Pilih Jenis UMKM' &&
                        nomorHP &&
                        email &&
                        alamat
                    ) {
                        // Jika semua input terisi, tampilkan modal Berhasil
                        var modalBerhasil = new bootstrap.Modal(
                            document.getElementById('modalBerhasil')
                        );
                        modalBerhasil.show();

                        // Kirim form setelah modal berhasil ditampilkan
                        document.querySelector('form').submit();
                    } else {
                        // Jika ada yang kosong, tampilkan modal Gagal

                            document.getElementById('modalGagal')
                        );
